name: Release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle: Byte_aarch64.dmg
            bundle-path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            updater-id: darwin-aarch64

          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle: byte_amd64.AppImage
            bundle-path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            updater-id: linux-x86_64

          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: Byte_x64.msi
            bundle-path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            updater-id: windows-x86_64

    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Clean build artifacts
        shell: bash
        run: |
          rm -rf dist tsconfig.tsbuildinfo src-tauri/target

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Build
        run: npm run tauri build -- --target ${{ matrix.target }} --no-sign

      - name: Ad-hoc sign macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Byte.app"
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"

          echo "=== Ad-hoc signing app ==="
          codesign --deep --force --sign - "$APP"
          codesign -v "$APP" && echo "✅ App signed successfully"

          echo "=== Rebuilding DMG from signed app ==="
          rm -f "$DMG_DIR"/*.dmg
          hdiutil create \
            -volname "Byte" \
            -srcfolder "$APP" \
            -ov \
            -format UDZO \
            "$DMG_DIR/Byte_aarch64.dmg"
          echo "✅ DMG rebuilt"

      - name: Capture Artifacts
        shell: bash
        run: |
          mkdir -p artifacts

          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"

          # Copy main installer
          INSTALLER=$(ls ${{ matrix.bundle-path }} 2>/dev/null | head -n 1) || true
          if [ -n "$INSTALLER" ]; then
            cp "$INSTALLER" "artifacts/${{ matrix.bundle }}"
          fi

          # Determine updater archive name and source
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            UPDATER_NAME="Byte_x64.msi.zip"
            UPDATER_DIR="$BUNDLE_DIR/msi"
            UPDATER_SRC=$(ls "$UPDATER_DIR/"*.msi.zip 2>/dev/null | head -n 1) || true
            if [ -z "$UPDATER_SRC" ] && [ -f "$INSTALLER" ]; then
              echo "Creating $UPDATER_NAME from MSI..."
              if command -v zip &>/dev/null; then
                (cd "$(dirname "$INSTALLER")" && zip -q "$UPDATER_NAME" "$(basename "$INSTALLER")")
              else
                (cd "$(dirname "$INSTALLER")" && 7z a -tzip "$UPDATER_NAME" "$(basename "$INSTALLER")" >/dev/null)
              fi
              UPDATER_SRC="$UPDATER_DIR/$UPDATER_NAME"
            fi
          elif [[ "${{ matrix.platform }}" == "ubuntu-latest" ]]; then
            UPDATER_NAME="byte_amd64.AppImage.tar.gz"
            UPDATER_DIR="$BUNDLE_DIR/appimage"
            UPDATER_SRC=$(ls "$UPDATER_DIR/"*.AppImage.tar.gz 2>/dev/null | head -n 1) || true
            if [ -z "$UPDATER_SRC" ] && [ -f "$INSTALLER" ]; then
              echo "Creating $UPDATER_NAME from AppImage..."
              tar czf "$UPDATER_DIR/$UPDATER_NAME" -C "$(dirname "$INSTALLER")" "$(basename "$INSTALLER")"
              UPDATER_SRC="$UPDATER_DIR/$UPDATER_NAME"
            fi
          else
            UPDATER_NAME="Byte_${{ matrix.target }}.app.tar.gz"
            UPDATER_DIR="$BUNDLE_DIR/macos"
            UPDATER_SRC=$(ls "$UPDATER_DIR/"*.app.tar.gz 2>/dev/null | head -n 1) || true
            if [ -z "$UPDATER_SRC" ]; then
              BUNDLE_APP=$(ls -d "$UPDATER_DIR/"*.app 2>/dev/null | head -n 1) || true
              if [ -n "$BUNDLE_APP" ]; then
                echo "Creating $UPDATER_NAME from .app bundle..."
                tar czf "$UPDATER_DIR/$UPDATER_NAME" -C "$UPDATER_DIR" "$(basename "$BUNDLE_APP")"
                UPDATER_SRC="$UPDATER_DIR/$UPDATER_NAME"
              fi
            fi
          fi

          # Sign the updater archive if no .sig file exists yet
          if [ -f "$UPDATER_SRC" ] && [ ! -f "$UPDATER_SRC.sig" ] && [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "Signing updater archive..."
            # Strip newlines from the key — GitHub secrets can inject a trailing \n
            # which breaks base64 decoding inside the Tauri signer.
            CLEAN_KEY=$(echo "$TAURI_SIGNING_PRIVATE_KEY" | tr -d '\n')
            TAURI_SIGNING_PRIVATE_KEY="$CLEAN_KEY" npx tauri signer sign "$UPDATER_SRC" > "$UPDATER_SRC.sig"
          fi

          # Copy updater artifacts to artifacts/
          if [ -f "$UPDATER_SRC" ]; then
            cp "$UPDATER_SRC" "artifacts/$UPDATER_NAME"
            if [ -f "$UPDATER_SRC.sig" ]; then
              cp "$UPDATER_SRC.sig" "artifacts/$UPDATER_NAME.sig"
              echo "$(cat $UPDATER_SRC.sig)" > "artifacts/${{ matrix.updater-id }}.sig.txt"
            fi
          fi

          # Save DMG checksum for Homebrew formula
          if [ -f "$INSTALLER" ]; then
            if command -v shasum &>/dev/null; then
              shasum -a 256 "$INSTALLER" | awk '{print $1}'
            elif command -v sha256sum &>/dev/null; then
              sha256sum "$INSTALLER" | awk '{print $1}'
            else
              certutil -hashfile "$INSTALLER" SHA256 | awk 'NR==2{print tolower($1)}'
            fi > "artifacts/${{ matrix.updater-id }}.dmg.sha256"
          fi

      - name: Capture exe for Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          EXE_DIR="src-tauri/target/${{ matrix.target }}/release"
          for f in "$EXE_DIR"/*.exe; do
            case "$(basename "$f")" in
              app.exe|Byte.exe)
                cp "$f" "artifacts/Byte_x64.exe"
                echo "Captured $(basename "$f") as Byte_x64.exe"
                ;;
            esac
          done

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*

      - name: Upload Signatures for Manifest
        uses: actions/upload-artifact@v4
        with:
          name: sigs-${{ matrix.updater-id }}
          path: |
            artifacts/*.sig.txt
            artifacts/*.sha256

  update-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all signatures
        uses: actions/download-artifact@v4
        with:
          path: sigs
          pattern: sigs-*
          merge-multiple: true

      - name: Create update manifest
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME}
          VERSION=${TAG#v}
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE="https://github.com/${{ github.repository }}/releases/download/$TAG"

          get_sig() {
            if [ -f "sigs/$1.sig.txt" ]; then
              cat "sigs/$1.sig.txt"
            else
              echo ""
            fi
          }

          SIG_WIN=$(get_sig "windows-x86_64")
          SIG_LINUX=$(get_sig "linux-x86_64")
          SIG_MAC_ARM=$(get_sig "darwin-aarch64")

          cat <<MANIFEST > update.json
          {
            "version": "$VERSION",
            "notes": "https://github.com/${{ github.repository }}/releases/tag/$TAG",
            "pub_date": "$DATE",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIG_WIN",
                "url": "$BASE/Byte_x64.msi.zip"
              },
              "linux-x86_64": {
                "signature": "$SIG_LINUX",
                "url": "$BASE/byte_amd64.AppImage.tar.gz"
              },
              "darwin-aarch64": {
                "signature": "$SIG_MAC_ARM",
                "url": "$BASE/Byte_aarch64-apple-darwin.app.tar.gz"
              }
            }
          }
          MANIFEST

      - name: Create Homebrew formula
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME}
          VERSION=${TAG#v}
          BASE="https://github.com/${{ github.repository }}/releases/download/$TAG"

          ARM_SHA=$(cat "sigs/darwin-aarch64.dmg.sha256" 2>/dev/null || echo "")

          if [ -z "$ARM_SHA" ]; then
            echo "No ARM DMG checksum found, skipping Homebrew formula"
            exit 0
          fi

          { echo 'cask "byte" do'
            echo "  version \"$VERSION\""
            echo "  sha256 \"$ARM_SHA\""
            echo "  url \"$BASE/Byte_aarch64.dmg\""
            echo ""
            echo "  name \"Byte\""
            echo "  desc \"AI assistant for your desktop\""
            echo "  homepage \"https://github.com/${{ github.repository }}\""
            echo ""
            echo "  livecheck do"
            echo "    url :url"
            echo "    strategy :github_latest"
            echo "  end"
            echo ""
            echo "  auto_updates true"
            echo ""
            echo "  app \"Byte.app\""
            echo ""
            echo "  postflight do"
            echo "    system_command \"/usr/bin/xattr\","
            echo "      args: [\"-rd\", \"com.apple.quarantine\", \"#{appdir}/Byte.app\"]"
            echo "  end"
            echo "end"
          } > byte.rb
          echo "Homebrew formula created"

      - name: Upload manifest to Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF_NAME}
          gh release upload "$TAG" update.json --clobber
          if [ -f byte.rb ]; then
            gh release upload "$TAG" byte.rb --clobber
          fi
          # Generate release notes on the already-existing release
          gh release edit "$TAG" --generate-notes || true

      - name: Push formula to homebrew-byte tap
        if: hashFiles('byte.rb') != ''
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "⚠️ HOMEBREW_TAP_TOKEN not set, skipping tap update"
            exit 0
          fi

          TAG=${GITHUB_REF_NAME}
          VERSION=${TAG#v}

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/usebyte/homebrew-byte.git tap-repo
          mkdir -p tap-repo/Casks
          cp byte.rb tap-repo/Casks/byte.rb

          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/byte.rb
          git commit -m "chore: update byte to $VERSION"
          git push
          echo "✅ Homebrew tap updated to $VERSION"
